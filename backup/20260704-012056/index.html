<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Hi Cola</title>
    <meta name="description" content="Hi Cola - 记录热爱，收藏成长中的每一次起飞">
    <link rel="stylesheet" href="assets/css/style.css">
  </head>
  <body>
    <div class="background-layer" aria-hidden="true"></div>
    <main class="site-shell">
      <section class="hero-panel" aria-labelledby="site-title">
        <p class="welcome" id="welcomeText">欢迎来到可乐的主页</p>
        <div class="title-block">
          <p class="eyebrow">Personal Gateway</p>
          <h1 id="site-title">Hi Cola</h1>
          <p class="subtitle">梦想起航，未来可期</p>
          <p class="description">记录热爱，收藏成长中的每一次起飞</p>
        </div>
      </section>

      <aside class="dashboard" aria-label="入口与时间信息">
        <section class="info-card" aria-label="当前日期时间">
          <div>
            <p class="date" id="dateText">--</p>
            <p class="time" id="timeText">--:--:--</p>
          </div>
          <p class="note">天空没有尽头，热爱可以飞得更远。</p>
        </section>

        <nav class="entry-grid" aria-label="家庭入口">
          <a class="entry-card" href="#">
            <span class="entry-index">01</span>
            <span class="entry-title">飞机世界</span>
            <span class="entry-desc">探索航空知识</span>
          </a>
          <a class="entry-card" href="#">
            <span class="entry-index">02</span>
            <span class="entry-title">航模记录</span>
            <span class="entry-desc">我的模型与制作</span>
          </a>
          <a class="entry-card" href="#">
            <span class="entry-index">03</span>
            <span class="entry-title">绘画作品</span>
            <span class="entry-desc">记录灵感与创作</span>
          </a>
          <a class="entry-card" href="#">
            <span class="entry-index">04</span>
            <span class="entry-title">成长相册</span>
            <span class="entry-desc">珍藏成长瞬间</span>
          </a>
          <a class="entry-card" href="#">
            <span class="entry-index">05</span>
            <span class="entry-title">学习资料</span>
            <span class="entry-desc">知识整理与笔记</span>
          </a>
          <!-- TODO: 替换为百度网盘链接 -->
          <a class="entry-card" href="#">
            <span class="entry-index">06</span>
            <span class="entry-title">我的网盘</span>
            <span class="entry-desc">文件存储与分享</span>
          </a>
        </nav>
      </aside>
    </main>

    <script src="assets/js/main.js"></script>
  </body>
</html>
