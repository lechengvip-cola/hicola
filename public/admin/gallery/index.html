<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>成长素材后台</title>
    <link rel="stylesheet" href="/assets/css/gallery.css" />
  </head>
  <body class="admin-page">
    <main class="page">
      <header class="topbar">
        <a class="btn" href="/gallery/">查看照片墙</a>
        <a class="btn" href="/">返回首页</a>
      </header>

      <section id="loginPanel" class="login-card glass">
        <p class="eyebrow">后台管理</p>
        <h1>成长素材后台</h1>
        <p class="lead">输入家庭后台密码后，可以上传照片和视频、归档素材、清理 R2 空间。</p>
        <div class="form-line login-line">
          <input id="adminPassword" type="password" autocomplete="current-password" placeholder="请输入后台密码" />
          <button id="loginBtn" class="btn primary" type="button">进入后台</button>
        </div>
        <p id="loginError" class="notice"></p>
      </section>

      <section id="workPanel" hidden>
        <section class="admin-hero glass">
          <div>
            <p class="eyebrow">成长照片库</p>
            <h1>素材管理</h1>
          </div>
          <div class="stat compact-stat">
            <span>素材数量</span>
            <strong id="totalPhotos">0</strong>
          </div>
        </section>

        <section class="admin-overview">
          <article id="capacity" class="panel glass capacity">
            <h2>R2 容量</h2>
            <strong id="capacityText">0 GB / 10 GB</strong>
            <div class="bar"><span id="capacityBar"></span></div>
            <p id="capacityMessage" class="muted">状态：正常</p>
          </article>

          <article class="panel glass upload-panel">
            <h2>上传照片和视频</h2>
            <div id="dropZone" class="upload-zone">
              <div>
                <strong>把照片或视频拖到这里</strong>
                <p class="muted">支持 JPG、PNG、WebP、HEIC、MP4、MOV、WebM</p>
                <button id="pickFiles" class="btn primary" type="button">选择素材上传</button>
                <input
                  id="fileInput"
                  type="file"
                  multiple
                  hidden
                  accept="image/*,video/mp4,video/quicktime,video/webm,video/x-m4v,.jpg,.jpeg,.png,.webp,.heic,.heif,.mp4,.mov,.webm,.m4v"
                />
              </div>
            </div>
            <p id="toast" class="notice"></p>
          </article>
        </section>

        <section class="panel glass security-panel">
          <div class="manager-head">
            <div>
              <p class="eyebrow">后台安全</p>
              <h2>密码与登录防护</h2>
              <p id="securityStatus" class="muted"></p>
            </div>
            <button id="adminLogoutBtn" class="btn" type="button">退出后台</button>
          </div>
          <div class="security-form">
            <input id="currentPassword" type="password" autocomplete="current-password" placeholder="当前后台密码" />
            <input id="newAdminPassword" type="password" autocomplete="new-password" placeholder="新密码，6 到 64 位" />
            <input id="confirmAdminPassword" type="password" autocomplete="new-password" placeholder="再次输入新密码" />
            <button id="changePasswordBtn" class="btn primary" type="button">修改后台密码</button>
          </div>
        </section>

        <section class="panel glass gallery-manager">
          <div class="manager-head">
            <div>
              <p class="eyebrow">按月份管理</p>
              <h2>成长素材库</h2>
            </div>
            <div class="selection-total">
              <span id="selectionSummary">按月份文件夹展示。</span>
              <strong id="selectedSize">0 KB</strong>
            </div>
          </div>

          <div class="selection-toolbar">
            <select id="monthFilter" class="select-pill" aria-label="按月份筛选"></select>
            <button id="selectVisible" class="btn" type="button">全选当前月</button>
            <button id="invertVisible" class="btn" type="button">反选当前月</button>
            <button id="selectBeforeMonth" class="btn" type="button">选择更早月份</button>
            <button id="clearSelection" class="btn" type="button">清空选择</button>
            <select id="exportYear" class="select-pill" aria-label="选择导出年份"></select>
            <button id="exportBtn" class="btn primary" type="button">导出 ZIP</button>
            <button id="reindexDatesBtn" class="btn" type="button">重新整理日期</button>
            <button id="deleteBtn" class="btn danger" type="button">删除已选</button>
          </div>

          <p class="selection-help">默认按月份文件夹展示。点击某个月份后，再批量选择、导出或删除该月素材。</p>
          <div id="adminPhotos" class="admin-list folder-list"></div>
        </section>
      </section>
    </main>

    <script src="/assets/js/gallery-admin.js" type="module"></script>
  </body>
</html>
