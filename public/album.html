<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>成长相册</title>
    <link rel="stylesheet" href="/assets/css/album.css" />
  </head>
  <body>
    <main class="album-shell album-shell-public">
      <header class="topbar minimal">
        <a class="btn ghost" href="/">返回首页</a>
      </header>

      <section id="loginView" class="login-card glass" hidden>
        <p class="eyebrow">成长相册</p>
        <h1>可乐的成长相册</h1>
        <p class="muted">这里珍藏着成长中的每一个瞬间。</p>
        <div id="closedMessage" class="toast"></div>
        <form id="loginForm">
          <label class="form-row">
            <span>家庭密码</span>
            <input id="passwordInput" type="password" autocomplete="current-password" />
          </label>
          <div class="inline-options">
            <label><input id="showPassword" type="checkbox" /> 显示密码</label>
            <label><input id="rememberDevice" type="checkbox" checked /> 记住本设备 30 天</label>
          </div>
          <button class="btn primary" type="submit">进入相册</button>
          <div id="loginToast" class="toast"></div>
        </form>
      </section>

      <section id="albumView" class="album-page album-page-v2" hidden>
        <section class="album-hero glass">
          <div class="album-hero-copy">
            <p class="eyebrow">成长相册</p>
            <h1>可乐的成长相册</h1>
            <p>把旅行、生日、日常和每一次闪光，慢慢收进这里。</p>
          </div>
          <div class="album-hero-stats" aria-label="相册统计">
            <div>
              <span>相册</span>
              <strong id="eventCount">0</strong>
            </div>
            <div>
              <span>精选</span>
              <strong id="favoriteCount">0</strong>
            </div>
          </div>
        </section>

        <section class="album-toolbar glass" aria-label="相册筛选">
          <div class="album-actions">
            <button class="tab active" data-view="all">全部相册</button>
            <button class="tab" data-view="favorites">精选照片</button>
            <select id="yearSelect" class="tab" aria-label="按年份筛选"></select>
          </div>
          <p class="album-toolbar-note">按时间整理成长瞬间，点击相册即可查看照片。</p>
        </section>

        <section class="album-content">
          <div class="section-heading">
            <div>
              <p class="eyebrow">相册列表</p>
              <h2 id="viewTitle">全部相册</h2>
            </div>
          </div>
          <section id="eventsPanel" class="album-grid"></section>
          <section id="detailPanel" class="panel glass" hidden></section>
          <section id="favoritesPanel" class="media-grid" hidden></section>
        </section>
      </section>
    </main>

    <div id="lightbox" class="lightbox">
      <button class="btn close" type="button">关闭</button>
      <button class="prev" type="button" aria-label="上一张">‹</button>
      <div id="lightboxContent"></div>
      <button class="next" type="button" aria-label="下一张">›</button>
    </div>
    <script src="/assets/js/album.js" type="module"></script>
  </body>
</html>
