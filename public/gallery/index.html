<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>可乐成长相册</title>
    <link rel="stylesheet" href="/assets/css/gallery.css?v=20260723-gallery-db-fix" />
  </head>
  <body class="gallery-page">
    <main class="page">
      <header class="topbar">
        <a class="btn" href="/admin/gallery/">上传照片和视频</a>
        <a class="btn" href="/">返回首页</a>
      </header>
      <section class="hero glass gallery-hero">
        <div>
          <p class="eyebrow">成长资料库</p>
          <h1>可乐成长相册</h1>
          <p class="lead">按年月整理照片和视频，像翻开一本持续更新的成长档案。</p>
        </div>
        <div class="stat">
          <span>照片与视频</span>
          <strong id="photoCount">0</strong>
        </div>
      </section>
      <section class="gallery-board glass">
        <nav id="filters" class="toolbar" aria-label="按月份筛选"></nav>
        <section class="gallery-content">
          <div class="gallery-content-head">
            <div>
              <span>相册视图</span>
              <strong id="galleryViewTitle">全部月份</strong>
            </div>
            <p>点击月份封面进入照片墙</p>
          </div>
          <section id="photoWall" class="month-wall"></section>
        </section>
      </section>
    </main>
    <div id="lightbox" class="lightbox">
      <button id="closeLightbox" class="btn close" type="button">关闭</button>
      <img id="lightboxImage" alt="" hidden />
      <video id="lightboxVideo" controls playsinline hidden></video>
    </div>
    <script src="/assets/js/gallery.js?v=20260723-gallery-db-fix" type="module"></script>
  </body>
</html>
